receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  resourcedetection:
    detectors: [gcp, env, system]
    timeout: 2s

exporters:
  googlecloud:
    project: zaeem-dev
    metric:
      prefix: custom.googleapis.com
    log:
      default_log_name: projects/zaeem-dev/logs/ai-tools

service:
  pipelines:
    metrics:
      receivers: [otlp]
      processors: [resourcedetection]
      exporters: [googlecloud]
    logs:
      receivers: [otlp]
      processors: [resourcedetection]
      exporters: [googlecloud]
