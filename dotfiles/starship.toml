# Global format (left prompt)
format = """
[-](bold #9ece6a) $directory\
$git_branch\
$git_status\
$gcloud\
$character
"""

add_newline = false
palette = "tokyonight"

# ───────── PALETTE ─────────
[palettes.tokyonight]
bg = "#1a1b26"        # main background
fg = "#c0caf5"        # primary foreground (soft white/blue)

blue = "#7aa2f7"      # bright blue
cyan = "#7dcfff"      # light cyan
green = "#9ece6a"     # green accent
yellow = "#e0af68"    # warm yellow
red = "#f7768e"       # soft red/pink
purple = "#bb9af7"    # signature tokyo night purple

muted = "#565f89"     # subtle text
subtle = "#24283b"    # darker background elements

# ─── DIRECTORY (PATH) ─────────────────────────────────────────────
[directory]
style = "bold cyan"
truncate_to_repo = true
format = "[$path]($style) / "

# ─── GIT BRANCH ───────────────────────────────────────────────────
[git_branch]
symbol = " "
style = "bold purple"
truncation_length = 20
truncation_symbol = "…"
format = "[$symbol$branch]($style) / "

# ─── GIT STATUS ───────────────────────────────────────────────────
[git_status]
style = "yellow"
format = "([$all_status$ahead_behind]($style)) / "
disabled = true

# ─── GCLOUD ───────────────────────────────────────────────────────
[gcloud]
symbol = " "
style = "bold blue"
format = "[$symbol($project)]($style) "
disabled = false

# ─── PROMPT CHARACTER ─────────────────────────────────────────────
[character]
success_symbol = "[➜](bold green)"
error_symbol = "[➜](bold red)"
