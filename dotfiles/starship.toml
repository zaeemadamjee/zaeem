# Global format (left prompt)
format = """
[-](bold #9ece6a) $directory\
$git_branch\
$git_status\
$gcloud\
$character
"""

add_newline = false

# ─── DIRECTORY (PATH) ─────────────────────────────────────────────
[directory]
style = "bold cyan"
truncate_to_repo = true
format = "[$path]($style) / "

# ─── GIT BRANCH ───────────────────────────────────────────────────
[git_branch]
symbol = " "
style = "bold purple"
truncation_length = 20
truncation_symbol = "…"
format = "[$symbol$branch]($style) / "

# ─── GIT STATUS ───────────────────────────────────────────────────
[git_status]
style = "yellow"
format = "([$all_status$ahead_behind]($style)) / "
disabled = true

# ─── GCLOUD ───────────────────────────────────────────────────────
[gcloud]
symbol = " "
style = "bold blue"
format = "[$symbol($project)]($style) "
disabled = false

# ─── PROMPT CHARACTER ─────────────────────────────────────────────
[character]
success_symbol = "[➜](bold green)"
error_symbol = "[➜](bold red)"
